        .header {

            backdrop-filter: blur(10px);
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf, #ff006e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header p {
            color: rgba(255,255,255,0.7);
            font-size: 1.1rem;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            text-align: center;
            padding: 15px 25px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
            margin-top: 5px;
        }
        
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .library-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .library-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .library-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        
        .library-a .library-header { background: linear-gradient(135deg, #06b6d4, #0891b2); }
        .library-b .library-header { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .library-c .library-header { background: linear-gradient(135deg, #ec4899, #db2777); }
        .library-d .library-header { background: linear-gradient(135deg, #f43f5e, #e11d48); }
        .library-e .library-header { background: linear-gradient(135deg, #f97316, #ea580c); }
        .library-f .library-header { background: linear-gradient(135deg, #22c55e, #16a34a); }
        
        .library-title {
            font-size: 1.3rem;
            font-weight: bold;
        }
        
        .library-count {
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        
        .library-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease;
        }
        
        .library-content.active {
            max-height: 2000px;
        }
        
        .library-list {
            padding: 15px;
        }
        
        .library-item {
            display: flex;
            align-items: flex-start;
            padding: 12px 15px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .library-item:hover {
            background: rgba(255,255,255,0.08);
        }
        
        .library-item.selected {
            border-color: #00d4ff;
            background: rgba(0,212,255,0.15);
        }
        
        .item-number {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.85rem;
            margin-right: 12px;
            flex-shrink: 0;
        }
        
        .library-a .item-number { background: rgba(6,182,212,0.3); color: #22d3ee; }
        .library-b .item-number { background: rgba(139,92,246,0.3); color: #a78bfa; }
        .library-c .item-number { background: rgba(236,72,153,0.3); color: #f472b6; }
        .library-d .item-number { background: rgba(244,63,94,0.3); color: #fb7185; }
        .library-e .item-number { background: rgba(249,115,22,0.3); color: #fb923c; }

            font-size: 0.95rem;

        }

            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            line-height: 1.4;
        }
        
        .toggle-icon {
            font-size: 1.2rem;
            transition: transform 0.3s;
        }
        
        .toggle-icon.active {
            transform: rotate(180deg);
        }
        
        .generator-section {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

            margin-bottom: 25px;
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .generator-btn {
            display: block;
            width: 100%;
            max-width: 400px;
            margin: 0 auto 25px;
            padding: 18px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }
        
        .generator-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102,126,234,0.5);
        }
        
        .generator-btn:active {
            transform: translateY(0);
        }
        
        .result-box {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 25px;
            margin-top: 20px;
            border: 2px solid rgba(0,212,255,0.3);
            display: none;
        }
        
        .result-box.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result-title {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #00d4ff;
        }
        
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .result-item {

            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid;
        }

        .result-item.c { border-color: #ec4899; }

            padding: 10px 20px;

(function () {
  const STORAGE_KEY = "sixlib_custom_items_v1";

  function getCustomObj() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}") || {};
    } catch {
      return {};
    }
  }

  function downloadText(filename, text, mime = "text/html;charset=utf-8") {
    const blob = new Blob([text], { type: mime });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      URL.revokeObjectURL(a.href);
      a.remove();
    }, 0);
  }

  function deepClone(x) {
    return JSON.parse(JSON.stringify(x));
  }

  function mergeCustomInto(base, custom) {
    const out = base || {};
    ["a", "b", "c", "d", "e", "f"].forEach((k) => {
      const arr = Array.isArray(custom[k]) ? custom[k] : [];
      if (!Array.isArray(out[k])) out[k] = [];
      arr.forEach((it) => {
        if (!it || typeof it !== "object") return;
        const name = String(it.name || "").trim();
        const desc = String(it.desc || "").trim();
        if (!name) return;

        // 去重：同 name + desc 视为同一条
        const exists = out[k].some((x) => x && x.name === name && String(x.desc || "").trim() === desc);
        if (!exists) out[k].push({ name, desc });
      });
    });
    return out;
  }

  function exportFrozenHTML() {
    const custom = getCustomObj();

    // 以当前运行时的 libraryData 为底（包含你原始库 + 可能已合并的自定义）
    const merged = mergeCustomInto(deepClone(window.libraryData || {}), custom);

    // 抓当前页面 HTML
    const html = document.documentElement.outerHTML;

    // 替换 const libraryData = {...};
    const re = /const\s+libraryData\s*=\s*\{[\s\S]*?\}\s*;/m;
    if (!re.test(html)) {
      alert("未找到 `const libraryData = {...};`，无法固化导出。");
      return;
    }

    const replacement = "const libraryData = " + JSON.stringify(merged, null, 2) + ";\n";
    const frozen = html.replace(re, replacement);

    const ts = new Date();
    const y = ts.getFullYear();
    const m = String(ts.getMonth() + 1).padStart(2, "0");
    const d = String(ts.getDate()).padStart(2, "0");
    downloadText(`sixlib_frozen_${y}${m}${d}.html`, frozen);
	localStorage.removeItem("sixlib_custom_items_v1");
  }

  function injectButton() {
    // 放在页面右上角悬浮
    const btn = document.createElement("button");
    btn.type = "button";
    btn.textContent = "导出固化版(HTML)";
    btn.style.position = "fixed";
    btn.style.top = "14px";
    btn.style.right = "14px";
    btn.style.zIndex = "99999";
    btn.style.padding = "10px 12px";
    btn.style.borderRadius = "10px";
    btn.style.border = "1px solid rgba(255,255,255,0.35)";
    btn.style.background = "rgba(0,0,0,0.22)";
    btn.style.color = "#fff";
    btn.style.cursor = "pointer";
    btn.onclick = exportFrozenHTML;
    document.body.appendChild(btn);
  }

  Promise.resolve().then(injectButton);
})();

      return obj && typeof obj === "object" ? obj : {};
    } catch {
      return {};
    }
  }

  function mergeCustomIntoLibraryData() {

      .replaceAll('"', "&quot;")

  // ---- 启动（必须在 libraryData 定义之后）----

function copyById(id, btnId) {
  const el = document.getElementById(id);
  if (!el) return;

  const text = el.innerText;
  navigator.clipboard.writeText(text).then(() => {
    if (!btnId) return;
    const btn = document.getElementById(btnId);
    if (!btn) return;
    btn.classList.add("copied");
    const old = btn.innerHTML;
    btn.innerHTML = `<span>✅</span><span>已复制</span>`;
    setTimeout(() => {
      btn.classList.remove("copied");
      btn.innerHTML = old;
    }, 900);
  });
}

    codeParts.push(`${letters[i]}${idx + 1}`);
  });

  const finalPrompt = `${promptParts.join(", ")}, 高质量人像摄影, 9:16画幅,Negative Prompt: low quality, worst quality, blurry, out of focus, overexposed, underexposed, bad lighting, bad anatomy, bad hands, extra fingers, missing fingers, fused fingers, deformed hands, mutated limbs, long neck, broken waist, distorted body, incorrect proportions, extra legs, extra arms, flat face, asymmetrical eyes, poorly drawn face, plastic skin, oversharpened skin, unrealistic texture, jpeg artifacts, watermark, logo, text, cartoon, anime, manga, illustration, painting, sketch, lineart, comic, chibi, cel shading, flat shading, 3d, cgi, render, blender, unreal engine, toy, doll, plastic, stylized, lowpoly`;
  const finalCode = codeParts.join(",");

  promptText.innerText = finalPrompt;

  // 3) 在提示词框下面追加“编号代码 + 复制按钮”（只创建一次）
  let codeWrap = document.getElementById("code-wrap");
  if (!codeWrap) {
    const promptBox = promptText.closest(".prompt-box");
    codeWrap = document.createElement("div");
    codeWrap.id = "code-wrap";
    codeWrap.style.marginTop = "18px";
    codeWrap.innerHTML = `
      <div class="prompt-label">随机编号代码：</div>
      <div class="prompt-text" id="code-text"></div>
      <button class="copy-btn" id="copy-code-btn" onclick="copyCode()">
        <span>📋</span><span>复制编号代码</span>
      </button>
    `;
    promptBox.appendChild(codeWrap);
  }

  const codeText = document.getElementById("code-text");
  codeText.innerText = finalCode;

  // 4) 显示结果区
  resultBox.classList.add("active");
}
        
        // 初始化
        initLists();
    </script>
